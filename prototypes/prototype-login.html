<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMe — Прототип страницы входа</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f4ff; color: #1a1a1a; line-height: 1.5; min-height: 100vh; }

    /* HEADER */
    header { background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.08); }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #7c3aed, #a78bfa); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 800; }
    .logo-text strong { display: block; font-size: 15px; font-weight: 700; }
    .logo-text span { display: block; font-size: 11px; color: #888; }
    .header-right { display: flex; gap: 8px; }
    .btn-outline { padding: 7px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; border: 1px solid rgba(0,0,0,0.12); background: transparent; color: #555; cursor: pointer; text-decoration: none; }
    .btn-primary-sm { padding: 7px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; background: #7c3aed; color: white; cursor: pointer; text-decoration: none; }

    /* AUTH SHELL */
    .auth-shell { min-height: calc(100vh - 57px); display: flex; align-items: center; justify-content: center; padding: 40px 16px; position: relative; }
    .auth-shell::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(600px 400px at 15% 20%, rgba(124,58,237,0.08), transparent 60%),
        radial-gradient(500px 350px at 85% 25%, rgba(139,92,246,0.06), transparent 60%),
        radial-gradient(500px 400px at 55% 90%, rgba(99,102,241,0.06), transparent 58%);
      pointer-events: none;
    }

    /* AUTH CARD */
    .auth-card { width: 100%; max-width: 420px; border-radius: 18px; overflow: hidden; background: rgba(255,255,255,0.88); box-shadow: 0 24px 60px rgba(0,0,0,0.12), 0 2px 10px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.07); position: relative; z-index: 1; }
    .auth-card-header { padding: 24px 24px 16px; border-bottom: 1px solid rgba(0,0,0,0.07); background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)); }
    .auth-kicker { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.15); color: #7c3aed; margin-bottom: 12px; }
    .auth-card-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .auth-card-header p { font-size: 13px; color: #888; }
    .auth-card-body { padding: 20px 24px 24px; }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; font-size: 14px; color: #333; background: #fafafa; outline: none; transition: border-color 0.15s, background 0.15s; }
    .form-input:focus { border-color: #7c3aed; background: #fff; box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }
    .form-input::placeholder { color: #bbb; }
    .form-hint { font-size: 12px; color: #aaa; margin-top: 4px; }
    .form-hint a { color: #7c3aed; text-decoration: none; font-weight: 600; }

    .btn-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #7c3aed; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .btn-submit:hover { background: #6d28d9; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
    .divider span { font-size: 12px; color: #aaa; font-weight: 600; }

    .btn-google { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.12); background: white; color: #333; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s; }
    .btn-google:hover { background: #f9f9f9; }
    .google-icon { width: 18px; height: 18px; }

    .auth-links { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
    .auth-links a { font-size: 13px; color: #7c3aed; text-decoration: none; font-weight: 600; }
    .auth-links a:hover { text-decoration: underline; }
    .auth-links .muted { font-size: 13px; color: #888; }
    .auth-links .muted a { color: #7c3aed; }

    /* FOOTER */
    footer { background: rgba(0,0,0,0.03); border-top: 1px solid rgba(0,0,0,0.07); }
    .footer-bottom { max-width: 1280px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .footer-bottom span { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a href="prototype-home.html" class="logo">
      <div class="logo-icon">F</div>
      <div class="logo-text"><strong>FindMe</strong><span>поиск питомцев</span></div>
    </a>
    <div class="header-right">
      <a href="#" class="btn-outline">Вход</a>
      <a href="prototype-register.html" class="btn-primary-sm">Регистрация</a>
    </div>
  </div>
</header>

<!-- AUTH SHELL -->
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-kicker">🔐 Авторизация</div>
      <h1>Добро пожаловать!</h1>
      <p>Войдите в аккаунт, чтобы продолжить</p>
    </div>
    <div class="auth-card-body">

      <div class="form-group">
        <label>Email</label>
        <input class="form-input" type="email" placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input class="form-input" type="password" placeholder="••••••••" />
        <div class="form-hint"><a href="#">Забыли пароль?</a></div>
      </div>

      <button class="btn-submit">Войти</button>

      <div class="divider"><span>или</span></div>

      <button class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Войти через Google
      </button>

      <div class="auth-links">
        <span class="muted">Нет аккаунта? <a href="#">Зарегистрироваться</a></span>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-bottom">
    <span>© 2026 FindMe · Дипломный проект</span>
    <span>Помогайте животным вернуться домой</span>
  </div>
</footer>

</body>
</html>
